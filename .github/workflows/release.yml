name: Release gem

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
    
    steps:
      # Set up
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be in format X.Y.Z"
            exit 1
          fi

      - name: Bump version.rb
        run: |
          sed -i 's/VERSION = "[^"]*"/VERSION = "${{ inputs.version }}"/' lib/moj_component/version.rb

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ruby

      - name: Update lockfile
        run: |
          bundle install --no-frozen
          cd spec/dummy && bundle install --no-frozen && cd ../..

      - name: Update CHANGELOG
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${{ inputs.version }}] - $DATE/" CHANGELOG.md

      - name: Create release branch and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release/v${{ inputs.version }}
          git add lib/moj_component/version.rb CHANGELOG.md Gemfile.lock spec/dummy/Gemfile.lock
          git commit -m "Bump version to ${{ inputs.version }}"
          git push origin release/v${{ inputs.version }}

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Release v${{ inputs.version }}" \
            --body "Bumps version to \`${{ inputs.version }}\`." \
            --base main \
            --head release/v${{ inputs.version }}
