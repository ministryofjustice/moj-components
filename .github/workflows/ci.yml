name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rubocop:
    uses: ministryofjustice/laa-reusable-github-actions/.github/workflows/rubocop.yml@df9a4a8ad625a391c27ccf81a1c1a2d7b23e6474 # main on 14/07/2026

  rspec:
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        rails: ["7.2", "8.0", "8.1"]
    runs-on: ubuntu-latest
    name: Testing with Ruby ${{ matrix.ruby }} and Rails ${{ matrix.rails }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install gems
        env:
          RAILS_VERSION: ${{ matrix.rails }}
        run: |
          gem install bundler
          bundle install --jobs 4 --retry 3

      - name: Run RSpec
        run: bundle exec rspec

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run Herb Linter
        run: npm run herb:lint

  dummy_app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spec/dummy
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/spec/dummy/Gemfile

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: spec/dummy/package-lock.json

      - name: Install dummy npm packages
        run: npm ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: "4.0.6"
          bundler-cache: true

      - name: Run dummy app CI
        run: bin/ci

      - name: Verify dummy assets build
        env:
          SECRET_KEY_BASE_DUMMY: 1
        run: bin/rails assets:precompile

  container_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build production image
        run: |
          docker build -f spec/dummy/Dockerfile -t moj-components-lookbook:${{ github.sha }} .

      - name: Run container
        run: |
          docker run -d --name lookbook-smoke -p 8081:80 \
            -e RAILS_SERVE_STATIC_FILES=1 \
            -e SECRET_KEY_BASE=dummy_ci_secret \
            moj-components-lookbook:${{ github.sha }}

      - name: Wait for app and smoke test
        run: |
          set -euo pipefail

          for i in $(seq 1 90); do
            if [ "$(docker inspect -f '{{.State.Running}}' lookbook-smoke)" != "true" ]; then
              echo "Container exited early"
              docker logs lookbook-smoke
              exit 1
            fi

            if curl -fsS http://127.0.0.1:8081/up > /dev/null; then
              break
            fi

            if [ "$i" -eq 90 ]; then
              echo "Container did not become healthy"
              docker logs lookbook-smoke
              exit 1
            fi

            sleep 2
          done

          curl -fLsS http://127.0.0.1:8081/lookbook > /dev/null || { docker logs lookbook-smoke; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: docker logs lookbook-smoke || true

      - name: Cleanup container
        if: always()
        run: docker rm -f lookbook-smoke || true
